/* Riposo cycle: 6-day base cycle. When riposo falls on Sat/Sun, it becomes a 2-day pair */
function calcRiposiCycle(data){
  if(!data||!data.days)return null;
  var rpDates=[];
  Object.keys(data.days).forEach(function(iso){
    var v=data.days[iso];
    if(v&&REST_CODES[v.t])rpDates.push(iso);

  rpDates.sort();
  if(rpDates.length<2)return null;
  /* Find anchor: first RP that's not part of a pair's second day */
  var anchor=null;
  for(var i=0;i<rpDates.length;i++){
    if(i>0){
      var prev=new Date(rpDates[i-1]+"T00:00:00"),curr=new Date(rpDates[i]+"T00:00:00");
      if(Math.round((curr-prev)/86400000)===1)continue;/* skip second of pair */
    }
    anchor=rpDates[i];break;
  }
  return{anchor:anchor,cycle:6};
}
function projectRiposi(rc,yr,mo){
  if(!rc||!rc.anchor)return{};

  var diffMs=start.getTime()-anc.getTime();

  for(var i=steps;i<steps+10;i++){

      if(dd.getMonth()===mo-1&&dd.getFullYear()===yr)set[toIso(dd)]=1;

}

function parseShiftFromPaste(text){

function openMoovit(data){

  var native="moovit://directions?"
    +"orig_lat="+data.origLat+"&orig_lon="+data.origLon
    +"&orig_name="+encodeURIComponent(data.origName)
    +"&dest_lat="+data.lat+"&dest_lon="+data.lon

    +"&date="+encodeURIComponent(data.isoDate)
    +"&auto_run=true&partner_id=turnismart";
  /* Web fallback */
  var web="https://moovitapp.com/index/it/trasporto_pubblico-directions?"
    +"origLat="+data.origLat+"&origLon="+data.origLon
    +"&origName="+encodeURIComponent(data.origName)
    +"&destLat="+data.lat+"&destLon="+data.lon
    +"&destName="+encodeURIComponent(data.name)
    +"&date="+encodeURIComponent(data.isoDate);
  /* Try native first, fallback to web */
  var start=Date.now();
  window.location.href=native;
  setTimeout(function(){
    if(Date.now()-start<2500)window.location.href=web;

/* In-app alarm: audio beep + vibration + alert */
function fireAlarm(label){
  /* Vibrate if supported */
  if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);
  /* Audio beep using Web Audio API */
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur){var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="square";g.gain.value=0.3;o.start(start);o.stop(start+dur);}
    for(var i=0;i<5;i++){beep(880,ctx.currentTime+i*0.6,0.3);beep(1100,ctx.currentTime+i*0.6+0.3,0.2);}
  }catch(e){}
  /* Show alert */
  alert("SVEGLIA! "+label);
}
function checkPendingAlarms(){
  if(!DB._test())return;
  var keys=DB.keys("ts_alarm_");
  var now=Date.now();
  keys.forEach(function(k){
    var a=DB.get(k);
    if(!a||!a.set)return;
    var diff=a.ts-now;
    if(diff<0){/* Already past — fire now if within 10min */
      if(diff>-600000){fireAlarm(a.label);} DB.del(k);
    }else if(diff<86400000){/* Within 24h — schedule */
      setTimeout(function(){fireAlarm(a.label);DB.del(k);},diff);
    }
  });
}

/* ══════════ Linee Browser ══════════ */
function LineeBrowser(props){
  var devs=props.devs;
  var _linea=useState(""),linea=_linea[0],setLinea=_linea[1];
  var _turno=useState(""),turno=_turno[0],setTurno=_turno[1];
  var _gt=useState(function(){var d=new Date().getDay();return d===0?"FEST":d===6?"SAB":"LV";}),gt=_gt[0],setGt=_gt[1];
  /* Build line map from BOTH turno codes AND segment ln fields */
  var lineMap={};
  Object.keys(devs).forEach(function(code){
    var parts=code.split(" ");
    if(parts.length===2){
      var ln=parts[0];
      if(!lineMap[ln])lineMap[ln]=[];
      lineMap[ln].push(code);
      /* Also check segments for variant lines */
      var segs=devs[code]||[];
      segs.forEach(function(s){
        if(s.ln&&s.ln!==ln){
          var vln=s.ln;
          if(!lineMap[vln])lineMap[vln]=[];
          if(lineMap[vln].indexOf(code)<0)lineMap[vln].push(code);
        }
      });
    }
  });
  var lineNums=Object.keys(lineMap).sort(function(a,b){var na=parseInt(a),nb=parseInt(b);if(isNaN(na)&&isNaN(nb))return a.localeCompare(b);if(isNaN(na))return 1;if(isNaN(nb))return -1;if(na!==nb)return na-nb;return a.localeCompare(b);});
  var turniForLine=linea?lineMap[linea]||[]:[];
  turniForLine.sort(function(a,b){return a.localeCompare(b);});
  function filterByGt(segs){

    if(gt==="ALL")return segs.slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});

      var isSAB=g.indexOf("SAB")>=0;
      var isFEST=g.indexOf("FEST")>=0||g.indexOf("DOM")>=0;
      if(gt==="LV")return isLV;
      if(gt==="SAB")return isSAB;
      if(gt==="FEST")return isFEST;
      return true;

  return(<div>
    <div style={{marginBottom:12}}><div style={{fontSize:12,color:G.t3,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Seleziona linea</div>

    {linea?(<div>

  var _uploadTarget=useState(null),uploadTarget=_uploadTarget[0],setUploadTarget=_uploadTarget[1];

  function reload(){setHist(getHistory());}
  function load(entry){
    if(entry.type==="preco"){var d=loadPrecoByKey(entry.key);if(d)props.onLoadPreco(d);}
    else if(entry.type==="orari"){var od=loadOrariByKey(entry.key);if(od&&Object.keys(od).length)props.onLoadOrari(od);}
  }
  function remove(entry){deleteEntry(entry.key);reload();}

  function triggerUpload(type){
    setUploadTarget(type);

    if(type==="orari"&&orariRef.current){orariRef.current.value="";orariRef.current.click();}

    var file=ev.target.files[0];

  }

      {months.map(function(item){
        var has=item.data;
        var hasPr=has&&has.preco;
        var hasOr=has&&has.orari;
        var isEmpty=!hasPr&&!hasOr;

        return(<div key={item.month} style={Object.assign({},glassCard,{padding:"12px 10px",borderColor:hasPr?G.accentBorder:G.glassBorder})}>
          <div style={{fontSize:14,fontWeight:700,color:hasPr?G.tw:G.t2,marginBottom:6,textAlign:"center"}}>{MESI_IT[item.month].slice(0,3)}</div>

              <button onClick={function(){remove(has.preco);}} style={{padding:"6px 6px",borderRadius:6,border:"none",background:G.redBg,color:G.red,fontSize:10,cursor:"pointer"}}>{"\\u2715"}</button>
            </div>

            <div style={{display:"flex",gap:3}}>
              <button onClick={function(){load(has.orari);}} style={{flex:1,padding:"6px 0",borderRadius:6,border:"none",background:G.greenBg,color:G.green,fontSize:10,fontWeight:600,cursor:"pointer"}}>Apri orari</button>

                <path d="M34 18l14-6v36l-14 6V18z" fill="#d4cc5a"/>
                <path d="M32 6c-6.6 0-12 5-12 11.2C20 25.6 32 38 32 38s12-12.4 12-20.8C44 11 38.6 6 32 6z" fill="#003366"/>
                <circle cx="32" cy="17" r="7" fill="#fff"/>
                <rect x="26.5" y="13" width="11" height="7.5" rx="2" fill="#003366"/>
                <rect x="27.5" y="14.2" width="4" height="2.8" rx="0.8" fill="#89b4e8"/>
                <rect x="32.5" y="14.2" width="4" height="2.8" rx="0.8" fill="#89b4e8"/>
                <circle cx="29" cy="21.8" r="1.1" fill="#003366"/><circle cx="35" cy="21.8" r="1.1" fill="#003366"/>
              </svg>
              <div style={{flex:1}}>
                <div style={{color:"#003366",fontWeight:800,fontSize:18}}>{data.nome||"Autista"}</div>
                <div style={{color:"#003366",fontSize:13,fontWeight:700,marginTop:2}}>N. caratteristico {data.matricola||""}</div>
                {data.dIn&&data.dTe?<div style={{color:"#5a4500",fontSize:12,marginTop:2}}>{toFmt(data.dIn)+" — "+toFmt(data.dTe)}</div>:null}
              </div>
            </div>
          ):(<div><div style={{fontSize:20,fontWeight:800,color:"#003366"}}>Turni Smart</div><div style={{fontSize:12,color:"#5a4500",marginTop:2}}>Gestione turni GTT — Deposito Gerbido</div></div>)}
        </div>

        {!data?(
          <div>
            {/* Upload area */}
            <div onClick={function(){if(!loading1&&fileRef1.current)fileRef1.current.click();}} style={Object.assign({},glassCard,{padding:"28px 20px",textAlign:"center",cursor:loading1?"wait":"pointer",marginBottom:14})}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={loading1?G.accent:G.tw} strokeWidth="1.5" style={{marginBottom:6}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
              <div style={{fontSize:15,fontWeight:600,color:loading1?G.accent:G.tw,marginBottom:3}}>{loading1?"Analisi in corso...":"Carica Preconoscenza"}</div>
              <div style={{color:G.t3,fontSize:12}}>PDF mensile turni personali</div>
            </div>

            {/* Storico */}
            {hasHistory?(
              <div>
                <div style={{fontSize:13,fontWeight:600,color:G.tw,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={G.accent} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Storico documenti
                </div>
                <Storico onLoadPreco={onLoadPreco} onLoadOrari={onLoadOrari} onUploadPreco={uploadPreco} onUploadOrari={uploadOrari}/>
              </div>
            ):(<div style={{textAlign:"center",padding:"20px 0",color:G.t3,fontSize:12}}>Carica una preconoscenza per iniziare. I documenti verranno salvati automaticamente per i mesi successivi.</div>)}

            {err?<div style={Object.assign({},glassCard,{padding:"12px 16px",marginTop:10,borderColor:err.indexOf("Caricati")===0?"rgba(27,122,61,0.25)":"rgba(239,83,80,0.25)",color:err.indexOf("Caricati")===0?G.green:G.red,fontSize:12,whiteSpace:"pre-wrap",maxHeight:200,overflow:"auto"})}>{err}</div>:null}
          </div>
        ):(
          <div>
            {nDevs>0?(
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                <div style={Object.assign({},glassCard,{flex:1,padding:"10px 14px",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:G.greenBorder})}>
                  <span style={{color:G.green,fontWeight:600}}>Orari GTT: {nDevs} turni</span>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={function(){/* Clear orari from storage and memory */setDevs({});if(data&&data.dIn){var ok=orariKey(data.dIn.getFullYear(),data.dIn.getMonth()+1);DB.del(ok);}if(fileRef2.current){fileRef2.current.value="";fileRef2.current.click();}}} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.accentBorder,background:G.accentGlass,color:G.accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>Ricarica</button>
                    <button onClick={function(){setDevs({});if(fileRef2.current)fileRef2.current.value="";}} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.cardBorder,background:"transparent",color:G.t3,fontSize:10,cursor:"pointer"}}>{"\\u00D7"}</button>
                  </div>
                </div>
                <button onClick={resetAll} style={{padding:"8px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>Reset</button>
              </div>
            ):(
              <div style={{marginBottom:12}}>
                <div onClick={function(){if(!loading2&&fileRef2.current)fileRef2.current.click();}} style={Object.assign({},glassCard,{padding:"24px 20px",textAlign:"center",cursor:loading2?"wait":"pointer",borderStyle:loading2?"solid":"dashed",borderColor:loading2?G.accentBorder:G.glassBorder})}>
                  <div style={{fontSize:15,fontWeight:600,color:loading2?G.accent:G.tw,marginBottom:5}}>{loading2?"Analisi in corso...":"Carica Orari Linee GTT"}</div>
                  <div style={{color:G.t2,fontSize:13}}>PDF con lo sviluppo turni del deposito</div>
                  <div style={{color:G.t3,fontSize:11,marginTop:8,fontStyle:"italic"}}>Aggiunge sviluppo completo, pausa spezzati e navigazione per linea</div>
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button onClick={resetAll} style={{padding:"6px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>Reset</button></div>
              </div>
            )}

            {err?<div style={Object.assign({},glassCard,{padding:"12px 16px",marginBottom:10,borderColor:err.indexOf("Caricati")===0?"rgba(27,122,61,0.25)":"rgba(239,83,80,0.25)",color:err.indexOf("Caricati")===0?G.green:G.red,fontSize:12,whiteSpace:"pre-wrap"})}>{err}</div>:null}

            <div style={{display:"flex",gap:4,marginBottom:14}}>
              <button style={tbS("home")} onClick={function(){setTab("home");}}>Home</button>
              <button style={tbS("mese")} onClick={function(){setTab("mese");setDet(null);}}>Mese</button>
              {nDevs>0?<button style={tbS("linee")} onClick={function(){setTab("linee");}}>Linee</button>:null}
              <button style={tbS("storico")} onClick={function(){setTab("storico");}}>Storico</button>
            </div>

            {(function(){var ballCount=0;Object.keys(days).forEach(function(k){if(days[k]&&days[k].t==="RIS")ballCount++;});if(ballCount===0)return null;return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",marginBottom:12,borderRadius:10,background:"rgba(255,209,0,0.15)",border:"1px solid rgba(255,209,0,0.40)"}}>
              <span style={{color:"#003366",fontSize:12,fontWeight:700}}>{ballCount} ballottaggi</span>
              <button onClick={function(){downloadBallottaggiICS(data);}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:G.red,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Salva su Calendario</button>
            </div>);})()}

            {tab==="home"?(<div>
              <div style={{display:"flex",gap:8,marginBottom:10}}><input style={Object.assign({},inp,{flex:1})} placeholder="es. 5 marzo, 05/03" value={q} onChange={function(ev){setQ(ev.target.value);}} onKeyDown={function(ev){if(ev.key==="Enter")cerca();}}/><button onClick={cerca} style={{padding:"0 18px",borderRadius:8,border:"none",background:"#ffd100",color:"#003366",fontWeight:800,fontSize:16,cursor:"pointer"}}>{"\\u2192"}</button></div>
              <div style={{display:"flex",gap:5,marginBottom:14}}><button style={qb} onClick={function(){rapido("oggi");}}>Oggi</button><button style={qb} onClick={function(){rapido("domani");}}>Domani</button><button style={qb} onClick={function(){rapido("week");}}>Settimana</button></div>
              {msg?<div style={Object.assign({},glassCard,{padding:"10px 14px",marginBottom:10,fontSize:13,color:G.t2})}>{msg}</div>:null}
              {res.map(function(r,i){return <Card key={i} date={r.date} v={r.v} devs={devs} allDays={days} onPaste={onPasteTurno}/>;})}
            </div>):null}

            {tab==="mese"?(<div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:12}}>
                <button onClick={function(){var nm=viewM-1,ny=viewY;if(nm<1){nm=12;ny--;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:16,fontWeight:700,cursor:"pointer"}}>{"\\u2039"}</button>
                <div style={{textAlign:"center",minWidth:130}}>
                  <div style={{fontSize:17,fontWeight:700,color:G.tw}}>{MESI_IT[viewM]} {viewY}</div>
                  {!isCurrentMonth?<button onClick={function(){setCalY(null);setCalM(null);setDet(null);}} style={{fontSize:10,color:G.accent,background:"transparent",border:"none",cursor:"pointer",marginTop:2}}>Torna a {MESI_IT[refM]} {refY}</button>:null}
                </div>
                <button onClick={function(){var nm=viewM+1,ny=viewY;if(nm>12){nm=1;ny++;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:16,fontWeight:700,cursor:"pointer"}}>{"\\u203A"}</button>
              </div>
              {(function(){
                var rc=loadRiposiCycle();
                var riposiSet=rc?projectRiposi(rc,viewY,viewM):{};
                var hasDays=Object.keys(calDays).length>0;
                var hasRiposi=Object.keys(riposiSet).length>0;
                if(!hasDays&&!hasRiposi)return(<div style={{textAlign:"center",padding:"30px 0"}}><div style={{color:G.t2,fontSize:14,marginBottom:6}}>Nessun dato per {MESI_IT[viewM]} {viewY}</div><div style={{color:G.t3,fontSize:12}}>Carica i PDF nella sezione Storico</div></div>);
                return(<div>
                  <Grid days={calDays} yr={viewY} mo={viewM} riposiSet={riposiSet} onTap={function(d,v){setDet({date:d,v:v});}}/>
                  {!hasDays&&hasRiposi?<div style={{fontSize:10,color:G.t3,marginTop:4,textAlign:"center"}}>Riposi proiettati dal ciclo di {rc.cycle} giorni</div>:null}
                  {det?<div style={{marginTop:12}}><Card date={det.date} v={det.v} devs={calDevsActive} allDays={calDays} onPaste={onPasteTurno}/></div>:null}
                </div>);
              })()}
            </div>):null}

            {tab==="linee"&&nDevs>0?<LineeBrowser devs={devs}/>:null}
            {tab==="storico"?<Storico onLoadPreco={onLoadPreco} onLoadOrari={onLoadOrari} onUploadPreco={uploadPreco} onUploadOrari={uploadOrari}/>:null}
          </div>
        )}
      </div>
    </div>
  );
}
